parameters:
  - name: githubRepository
    type: string
    displayName: 'GitHub repository (owner/repo)'
  - name: staleThresholdDays
    type: number
    default: 14
    displayName: 'Days before marking PR as stale'
  - name: closureThresholdDays
    type: number
    default: 21
    displayName: 'Days before closing PR'
  - name: variableGroupName
    type: string
    default: 'GitHub-Secrets'
    displayName: 'Variable group containing GITHUB_TOKEN'

steps:
  - script: |
      echo "Checking for stale PRs in ${{ parameters.githubRepository }}..."

      REPO="${{ parameters.githubRepository }}"
      STALE_DAYS=${{ parameters.staleThresholdDays }}
      CLOSE_DAYS=${{ parameters.closureThresholdDays }}

      # Get PRs updated > STALE_DAYS ago
      stale_prs=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/pulls?state=open" | \
        jq '.[] | select(.updated_at < "'$(date -d "$STALE_DAYS days ago" -Iseconds)'") | .number')
   
      for pr in $stale_prs; do
        echo "Marking PR #$pr as stale..."
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"labels":["stale"]}' \
          "https://api.github.com/repos/$REPO/issues/$pr/labels"
      done

      # Close PRs older than CLOSE_DAYS
      very_stale_prs=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        "https://api.github.com/repos/$REPO/pulls?state=open" | \
        jq '.[] | select(.updated_at < "'$(date -d "$CLOSE_DAYS days ago" -Iseconds)'") | .number')

      for pr in $very_stale_prs; do
        echo "Closing PR #$pr..."
        curl -s -X PATCH \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"state":"closed"}' \
          "https://api.github.com/repos/$REPO/pulls/$pr"
      done

    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)
    displayName: Close stale PRs